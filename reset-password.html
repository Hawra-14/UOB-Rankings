<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – UoB Rankings Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary-blue: #094FA3;
      --bright-blue: #4B95FA;
      --bg: #FFFFFF;
      --surface-alt: #F5F7FA;
      --border: rgba(9, 79, 163, 0.15);
      --text-primary: #032E64;
      --text-secondary: #595F61;
      --supporting-red: #ED1C24;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reset-container {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(9, 79, 163, 0.1);
      border: 1.5px solid var(--border);
    }
    .logo-area { text-align: center; margin-bottom: 1.5rem; }
    .form-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .form-subtitle {
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.45rem;
    }
    .field input {
      width: 100%;
      background: var(--surface-alt);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s;
    }
    .field input:focus {
      border-color: var(--primary-blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(9, 79, 163, 0.1);
    }
    #otp { text-align: center; letter-spacing: 0.3em; font-weight: 700; font-size: 1.1rem; }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--primary-blue), var(--bright-blue));
      color: #fff;
      border: none;
      padding: 0.85rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 3px 10px rgba(9, 79, 163, 0.25);
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(9, 79, 163, 0.35); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .error-msg {
      font-size: 0.78rem;
      color: var(--supporting-red);
      margin-top: 0.5rem;
      display: none;
      text-align: center;
      background: #fef2f2;
      padding: 0.6rem;
      border-radius: 6px;
      border: 1px solid #fecaca;
    }
    .error-msg.show { display: block; }
    
    .success-msg {
      font-size: 0.85rem;
      color: #15803d;
      margin-top: 0.5rem;
      display: none;
      text-align: center;
      background: #f0fdf4;
      padding: 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      border: 1px solid #bbf7d0;
    }
    .success-msg.show { display: block; }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover { color: var(--primary-blue); }
  </style>
</head>
<body>

  <div class="reset-container">
    <div class="logo-area">
      <img src="assets/image/UOB-new-logo.png" alt="UoB" style="height: 50px; width: auto; object-fit: contain;" 
           onerror="this.style.display='none'">
    </div>
    
    <h1 class="form-title">Create New Password</h1>
    <p class="form-subtitle">Enter the 6-digit OTP sent to your email and choose a new password.</p>

    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="field">
        <label for="otp">One-Time Password (OTP)</label>
        <input type="text" id="otp" maxlength="6" placeholder="000000" required pattern="\d{6}" title="Please enter a 6-digit number" />
      </div>

      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="••••••••" required minlength="8" />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" />
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <i class="fas fa-lock"></i> Reset Password
      </button>
    </form>

    <a href="login.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Sign In
    </a>
  </div>

  <script>
    const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:3002'
      : 'https://uob-rankings.onrender.com';

    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
      document.getElementById('errorMsg').textContent = 'Invalid or missing reset token. Please request a new link from the login page.';
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('submitBtn').disabled = true;
    }

    // Auto-format OTP input (numbers only)
    document.getElementById('otp').addEventListener('input', function(e) {
      this.value = this.value.replace(/[^0-9]/g, '');
    });

    async function handleReset(e) {
      e.preventDefault();
      
      const otp = document.getElementById('otp').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('show');
        return;
      }

      if (newPassword.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters long.';
        errorEl.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, otp, newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Failed to reset password.';
          errorEl.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
          return;
        }

        // Success!
        successEl.textContent = 'Password successfully reset! Redirecting to login...';
        successEl.classList.add('show');
        document.getElementById('resetForm').style.display = 'none';
        document.querySelector('.form-subtitle').style.display = 'none';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2500);

      } catch (err) {
        errorEl.textContent = 'Network error. Please check your connection and try again.';
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
      }
    }
  </script>
</body>
</html>
