<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error – UoB Rankings Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-blue: #094FA3;
      --bright-blue: #4B95FA;
      --primary-gold: #B99B68;
      --bright-gold: #E4C082;
      --light-gold: #F6EBD9;
      --supporting-red: #ED1C24;
      --bg: #F5F7FA;
      --surface: #FFFFFF;
      --text-primary: #032E64;
      --text-secondary: #595F61;
      --border: rgba(9, 79, 163, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .error-container {
      max-width: 500px;
      background: var(--surface);
      padding: 3rem 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(9, 79, 163, 0.08);
      border-top: 4px solid var(--primary-blue);
    }
    .error-code {
      font-family: 'Instrument Serif', serif;
      font-size: 6rem;
      font-weight: 400;
      color: var(--primary-blue);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .error-msg {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--primary-blue), var(--bright-blue));
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 0.8rem 1.8rem;
      border-radius: 8px;
      transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(9, 79, 163, 0.25);
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(9, 79, 163, 0.35);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code" id="errCode">404</div>
    <div class="error-title" id="errTitle">Page Not Found</div>
    <div class="error-msg" id="errMsg">We couldn't find the page you were looking for. It might have been moved, deleted, or never existed in the first place.</div>
    <a href="/login.html" class="btn-primary" id="backBtn">
      <i class="fas fa-arrow-left"></i> Return to Sign In
    </a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '404';
    const errCodeEl = document.getElementById('errCode');
    const errTitleEl = document.getElementById('errTitle');
    const errMsgEl = document.getElementById('errMsg');
    
    errCodeEl.textContent = code;
    if (code === '500') {
      errTitleEl.textContent = 'Server Error';
      errMsgEl.textContent = 'Something went wrong on our end. Please try again later or contact the IT department if the issue persists.';
    } else if (code === '403' || code === '401') {
      errTitleEl.textContent = 'Access Denied';
      errMsgEl.textContent = 'You do not have permission to view this page. Please log in with the appropriate credentials.';
    } else {
      errTitleEl.textContent = 'Page Not Found';
      errMsgEl.textContent = 'We couldn\'t find the page you were looking for. Please check the URL and try again.';
    }
  </script>
</body>
</html>
