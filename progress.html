<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress – UoB Rankings Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* =========================================
       1. CSS VARIABLES (Unified Admin/Dept)
       ========================================= */
    :root {
      --primary-blue: #094FA3;
      --bright-blue: #4B95FA;
      --light-blue: #91BDFC;
      --primary-gold: #B99B68;
      --bright-gold: #E4C082;
      --light-gold: #F6EBD9;
      --supporting-red: #ED1C24;
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --surface-alt: #F5F7FA;
      --border: rgba(9, 79, 163, 0.15);
      --text-primary: #032E64;
      --text-secondary: #595F61;
      --text-light: #7B8285;
      --card-shadow: 0 2px 12px rgba(9, 79, 163, 0.08);
      --green: #16a34a;
      --amber: #f59e0b;
      --sidebar-w: 260px;
      --sidebar-w-collapsed: 70px;
      --header-h: 70px;
    }

    /* =========================================
       2. RESET & BASE
       ========================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--surface-alt);
      color: var(--text-primary);
      overflow: hidden;
    }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

    /* =========================================
       3. LAYOUT (Header, Sidebar, Main)
       ========================================= */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); z-index: 200;
      background: var(--surface); display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; box-shadow: 0 2px 8px rgba(9, 79, 163, 0.1); border-bottom: 2px solid var(--primary-blue);
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .header-logo { height: 50px; width: auto; object-fit: contain; }
    
    .menu-toggle {
      width: 40px; height: 40px; border-radius: 8px; background: var(--surface-alt); border: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary-blue); font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
    }
    .menu-toggle:hover { background: var(--light-blue); color: #fff; }

    .user-pill {
      display: flex; align-items: center; gap: .7rem; background: var(--surface-alt);
      padding: 0.5rem 1.2rem; border-radius: 999px; border: 1.5px solid var(--border);
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-blue), var(--bright-blue));
      color: #fff; font-size: .8rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }
    .user-name { font-size: .85rem; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .user-role { font-size: .68rem; color: var(--text-secondary); }

    .layout { display: flex; margin-top: var(--header-h); height: calc(100vh - var(--header-h)); }

    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: linear-gradient(180deg, var(--primary-blue) 0%, var(--bright-blue) 100%);
      display: flex; flex-direction: column; overflow-y: auto;
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sidebar.collapsed { width: var(--sidebar-w-collapsed); }

    .nav-section { margin-top: 1.2rem; }
    .nav-label {
      font-size: .62rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5); padding: 0.6rem 1.2rem; white-space: nowrap; overflow: hidden;
    }
    .nav-item {
      display: flex; align-items: center; gap: .85rem; padding: .75rem 1.2rem; color: rgba(255, 255, 255, 0.8);
      font-size: .85rem; font-weight: 500; border-left: 3px solid transparent; 
      transition: all .2s; cursor: pointer; white-space: nowrap; overflow: hidden;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }
    .nav-item.active { background: rgba(255, 255, 255, 0.18); color: #fff; font-weight: 600; border-left-color: var(--bright-gold); }
    .nav-icon { font-size: 1.05rem; width: 22px; text-align: center; flex-shrink: 0; color: #fff; }
    .nav-text { opacity: 1; transition: opacity 0.2s; }
    .sidebar.collapsed .nav-text, .sidebar.collapsed .nav-label, .sidebar.collapsed .nav-badge { opacity: 0; width: 0; display: none; }

    .nav-badge {
      margin-left: auto; background: var(--bright-gold); color: var(--text-primary); font-size: .65rem;
      font-weight: 700; padding: .15rem .5rem; border-radius: 999px; flex-shrink: 0;
    }
    .nav-spacer { flex: 1; }
    .nav-logout {
      display: flex; align-items: center; gap: .85rem; padding: .75rem 1.2rem; color: #fecaca;
      font-size: .85rem; font-weight: 600; border-left: 3px solid transparent; 
      cursor: pointer; transition: all .2s; white-space: nowrap; overflow: hidden;
    }
    .nav-logout:hover { background: rgba(248, 113, 113, 0.15); color: #fff; }
    
    /* Collapsible Sub-menu Styles */
    .nav-children { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
    .nav-children.open { max-height: 500px; }
    .nav-child {
      display: flex; align-items: center; gap: .85rem; padding: .7rem 1.2rem .7rem 3rem; color: rgba(255, 255, 255, 0.7);
      font-size: .82rem; font-weight: 500; border-left: 3px solid transparent; 
      transition: all .16s; white-space: nowrap; overflow: hidden; text-decoration: none;
    }
    .nav-child:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .nav-child.active { color: #fff; font-weight: 600; border-left-color: var(--bright-gold); background: rgba(255, 255, 255, .15); }

    .main { flex: 1; overflow-y: auto; padding: 2rem; }

    /* =========================================
       4. PAGE SPECIFIC COMPONENTS
       ========================================= */
    .page-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; color: var(--text-primary); }
    .page-sub { font-size: .9rem; color: var(--text-secondary); margin-top: .25rem; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .prog-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.6rem 1.4rem 1.4rem;
      box-shadow: var(--card-shadow);
      border: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow .18s, transform .16s;
      cursor: pointer;
      text-decoration: none;
    }
    .prog-card:hover {
      box-shadow: 0 8px 24px rgba(9, 79, 163, 0.12);
      transform: translateY(-4px);
      border-color: var(--light-blue);
    }

    /* Donut chart */
    .donut-wrap {
      position: relative;
      width: 150px;
      height: 150px;
      margin-bottom: 1.4rem;
    }
    .donut-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .donut-bg {
      fill: none;
      stroke: var(--surface-alt);
      stroke-width: 10;
    }
    .donut-fill {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dasharray 1s ease;
    }
    .donut-pct {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text-primary);
      pointer-events: none;
    }

    /* Card info */
    .card-name-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      width: 100%;
      margin-bottom: .3rem;
    }
    .card-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-name {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .card-detail {
      font-size: .8rem;
      color: var(--text-secondary);
      margin-bottom: .85rem;
      width: 100%;
      text-align: center;
    }

    /* Progress bar */
    .prog-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--surface-alt);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: .85rem;
    }
    .prog-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 1s ease;
    }

    /* Deadline */
    .card-deadline {
      font-size: .78rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: .4rem;
      width: 100%;
      justify-content: center;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: var(--header-h); height: calc(100vh - var(--header-h));
        z-index: 150; transform: translateX(-100%); transition: transform 0.3s;
      }
      .sidebar.mobile-open { transform: translateX(0); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    </div>
    <div class="header-right">
      <img src="assets/image/UOB-new-logo.png" alt="UoB Logo" class="header-logo">
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">IT</div>
        <div class="user-info">
          <div class="user-name" id="userName">Department User</div>
          <div class="user-role">Department</div>
        </div>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <a class="nav-item" href="dashboard-dept.html">
          <i class="fas fa-chart-line nav-icon"></i><span class="nav-text">Dashboard</span>
        </a>
      </div>
      
      <div class="nav-section">
        <div class="nav-label">Ranking Cycles</div>
        <div class="nav-item" style="padding-right:.5rem" onclick="toggleCycles()">
          <i class="fas fa-trophy nav-icon"></i><span class="nav-text">My Forms</span>
          <i class="fas fa-chevron-down" style="margin-left:auto;font-size:.65rem;transition:transform 0.3s" id="cyclesArrow"></i>
        </div>
        <div class="nav-children open" id="navCycles">
          <a class="nav-child" href="ranking-forms.html">
            <i class="fas fa-clipboard-list nav-icon" style="font-size:.9rem"></i><span class="nav-text">All Assigned Forms</span>
          </a>
          <a class="nav-child" id="nav-sustainability" href="ranking-forms.html">
            <i class="fas fa-leaf nav-icon" style="font-size:.9rem"></i><span class="nav-text">QS Sustainability</span>
          </a>
          <a class="nav-child" id="nav-qs-wur" href="ranking-forms.html">
            <i class="fas fa-award nav-icon" style="font-size:.9rem"></i><span class="nav-text">QS WUR</span>
          </a>
          <a class="nav-child" id="nav-the-wur" href="ranking-forms.html">
            <i class="fas fa-chart-bar nav-icon" style="font-size:.9rem"></i><span class="nav-text">THE WUR</span>
          </a>
          <a class="nav-child" id="nav-the-impact" href="ranking-forms.html">
            <i class="fas fa-bullseye nav-icon" style="font-size:.9rem"></i><span class="nav-text">THE Impact</span>
          </a>
          <a class="nav-child" id="nav-greenmetric" href="ranking-forms.html">
            <i class="fas fa-seedling nav-icon" style="font-size:.9rem"></i><span class="nav-text">GreenMetric</span>
          </a>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Monitoring</div>
        <a class="nav-item active" href="progress.html">
          <i class="fas fa-chart-area nav-icon"></i><span class="nav-text">Progress</span>
        </a>
      </div>

      <div class="nav-spacer"></div>
      <a class="nav-logout" href="login.html" id="logoutBtn">
        <i class="fas fa-sign-out-alt nav-icon"></i><span class="nav-text">Logout</span>
      </a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="page-hdr">
        <div>
          <div class="page-title">Progress Tracking</div>
          <div class="page-sub">Your submission completion across all ranking forms</div>
        </div>
      </div>

      <div class="cards-grid" id="cardsGrid">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-secondary)">
          <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary-blue);"></i>
          <p style="margin-top: 1rem;">Loading progress...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:3002'
      : 'https://uob-rankings.onrender.com';

    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = 'login.html';

    // Display user info
    document.getElementById('userName').textContent = user.name || 'User';
    document.querySelector('.user-role').textContent = user.role === 'admin' ? 'Administrator' : 'Department User';
    const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    document.getElementById('userAvatar').textContent = initials;

    // Sidebar toggle
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('mobile-open');
      } else {
        sidebar.classList.toggle('collapsed');
      }
    }

    function toggleCycles() {
      const el = document.getElementById('navCycles');
      const ar = document.getElementById('cyclesArrow');
      el.classList.toggle('open');
      ar.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        await fetch(`${API_BASE}/api/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
      } catch (e) { console.error(e); }
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    });

    // ── Helpers ──────────────────────────────────────────────
    function getColor(name) {
      const n = (name || '').toLowerCase();
      if (n.includes('greenmetric')) return 'var(--green)'; 
      if (n.includes('impact')) return 'var(--supporting-red)'; 
      if (n.includes('sustainability')) return 'var(--primary-blue)'; 
      if (n.includes('qs')) return 'var(--primary-gold)'; 
      if (n.includes('the') && n.includes('world')) return 'var(--bright-blue)'; 
      return 'var(--primary-blue)';
    }

    function formatDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      if (isNaN(dt)) return '—';
      return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ── Load progress data ───────────────────────────────────
    async function loadProgress() {
      const grid = document.getElementById('cardsGrid');
      try {
        const res = await fetch(`${API_BASE}/api/questions/my-rankings`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        let rankings = await res.json();

        // Wire sidebar type links
        function rankingType(name) {
          const n = (name || '').toLowerCase();
          if (n.includes('greenmetric')) return 'greenmetric';
          if (n.includes('impact')) return 'the-impact';
          if (n.includes('sustainability')) return 'sustainability';
          if (n.includes('qs') && n.includes('world')) return 'qs-wur';
          if (n.includes('the') && n.includes('world')) return 'the-wur';
          if (n.includes('qs')) return 'qs-wur';
          return n;
        }

        if (Array.isArray(rankings)) {
          const latestByType = {};
          rankings.forEach(r => {
            const t = rankingType(r.name);
            if (!latestByType[t] || (r.year || 0) > (latestByType[t].year || 0)) {
              latestByType[t] = r;
            }
          });
          Object.keys(latestByType).forEach(type => {
            const el = document.getElementById('nav-' + type);
            if (!el) return;
            const cycle = latestByType[type];
            el.href = cycle ? `form.html?cycle=${cycle.id}` : 'ranking-forms.html';
          });
        }

        // Keep only the most recent year
        if (Array.isArray(rankings) && rankings.length) {
          const maxYear = Math.max(...rankings.map(r => r.year || 0));
          rankings = rankings.filter(r => (r.year || 0) === maxYear);
        }

        if (!Array.isArray(rankings) || !rankings.length) {
          grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-secondary)">
            <i class="fas fa-chart-pie" style="font-size: 2.5rem; color: var(--light-blue); margin-bottom: 1rem; display: block;"></i>
            <div style="font-weight:600;margin-bottom:.3rem; font-size: 1.1rem; color: var(--text-primary);">No ranking forms assigned yet</div>
            <div style="font-size:.88rem">Your progress will appear here once questions are assigned to your department.</div>
          </div>`;
          return;
        }

        const circumference = 2 * Math.PI * 60; // r = 60
        grid.innerHTML = rankings.map(r => {
          const assigned = r.assigned || 0;
          const submitted = r.submitted || 0;
          const pct = assigned ? Math.round((submitted / assigned) * 100) : 0;
          const color = getColor(r.name);
          const dash = (pct / 100) * circumference;
          const nextDue = formatDate(r.next_due || r.deadline);
          const deadlineLine = r.outstanding > 0
            ? `<div class="card-deadline"><i class="fas fa-calendar-alt"></i> Next due: ${nextDue}</div>`
            : `<div class="card-deadline" style="color: var(--green);"><i class="fas fa-check-circle"></i> All questions answered</div>`;

          return `
          <a class="prog-card" href="form.html?cycle=${r.id}">
            <div class="donut-wrap">
              <svg viewBox="0 0 160 160">
                <circle class="donut-bg" cx="80" cy="80" r="60" />
                <circle class="donut-fill" cx="80" cy="80" r="60" stroke="${color}"
                stroke-dasharray="${dash} ${circumference}" stroke-dashoffset="0" />
              </svg>
              <div class="donut-pct">${pct}%</div>
            </div>
            <div class="card-name-row">
              <div class="card-dot" style="background:${color}"></div>
              <div class="card-name">${r.name}</div>
            </div>
            <div class="card-detail">${submitted} / ${assigned} answered</div>
            <div class="prog-bar-wrap">
              <div class="prog-bar" style="width:${pct}%;background:${color}"></div>
            </div>
            ${deadlineLine}
          </a>`;
        }).join('');
      } catch (e) {
        console.error(e);
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--supporting-red)">Failed to load progress.</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadProgress();
      // Open cycles menu by default
      document.getElementById('navCycles').classList.add('open');
      document.getElementById('cyclesArrow').style.transform = 'rotate(180deg)';
    });
  </script>
</body>
</html>
